services:
  db:
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-prefect}
      POSTGRES_PASSWORD: ${DB_PASS:-test_pass}
      POSTGRES_DB: ${DB_NAME:-prefect}
    volumes:
      - prefect_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-prefect} -d ${DB_NAME:-prefect}"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
    image: momentum-server
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4200:4200"
    environment:
      - PREFECT_API_DATABASE_CONNECTION_URL=postgresql+asyncpg://${DB_USER:-prefect}:${DB_PASS:-test_pass}@db:5432/${DB_NAME:-prefect}
      - PREFECT_SERVER_API_HOST=0.0.0.0
      # Using a variable for the UI URL to avoid hardcoding your Proxmox/Local IP
      - PREFECT_SERVER_UI_API_URL=${PREFECT_UI_URL:-http://localhost:4200/api}
      - PREFECT_API_SERVICES_LIFESPAN_TIMEOUT=100
    command: prefect server start

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: momentum-worker
    restart: always
    depends_on:
      server:
        condition: service_healthy
    environment:
      - PREFECT_API_URL=http://server:4200/api
      # Financial API Secrets
      - KIS_APP_KEY=${KIS_APP_KEY}
      - KIS_APP_SECRET=${KIS_APP_SECRET}
      - KIS_TOKEN_PATH=/opt/momentum-ops/ephemeral/kis_token.json
      # Database connection for the actual flow execution
      - DATABASE_URL=postgresql://${DB_USER:-prefect}:${DB_PASS:-test_pass}@db:5432/${DB_NAME:-prefect}
    # Aligned with your Proxmox local pool naming convention
    command: prefect worker start --pool proxmox-local-pool --type process

volumes:
  prefect_db: